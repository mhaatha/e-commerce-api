openapi: 3.0.3
info:
  title: E-Commerce API
  description: API specification for E-Commerce
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000
tags:
  - name: User API
    description: Handles user account management such as registration, profile updates, and account deletion.
paths:
  /api/v1/users:
    post:
      summary: Register a user
      operationId: registerANewUser
      tags:
        - User API
      requestBody:
        description: Required data to register as a new user
        content:
          application/json:
            schema:
              required:
                - fullName
                - type
                - password
              type: object
              properties:
                fullName:
                  type: string
                  minLength: 1
                  example: John Doe
                email:
                  type: string
                  format: email
                  minLength: 3
                  maxLength: 254
                  example: johndoe@example.com
                phoneNumber:
                  type: string
                  example: "081234567890"
                  minLength: 4
                  maxLength: 15
                type:
                  type: string
                  enum:
                    - user
                    - merchant
                password:
                  type: string
      responses:
        "200":
          description: Success registered a user
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      fullName:
                        type: string
                        example: John Doe
                      type:
                        type: string
                        enum:
                          - user
                          - merchant
