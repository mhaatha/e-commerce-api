openapi: 3.0.3
info:
  title: E-Commerce API
  description: API specification for E-Commerce
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000
tags:
  - name: Product API
    description: Handles product management such as show the products, update it, delete it, etc.
  - name: Health Check API
    description: Verify operational status of the application
paths:
  /api/v1/products:
    post:
      summary: Create a new product
      operationId: createProduct
      security:
        - BearerAuth: []
      tags:
        - Product API
      requestBody:
        $ref: "#/components/requestBodies/CreateProduct"
      responses:
        "201":
          $ref: "#/components/responses/CreateProductSuccess"
        "400":
          $ref: "#/components/responses/CreateProductBadRequest"
        "401":
          $ref: "#/components/responses/CreateProductUnauthorized"
        "403":
          $ref: "#/components/responses/CreateProductForbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/health:
    get:
      summary: Get the current health status
      operationId: getCurrentHealthStatus
      tags:
        - Health Check API
      responses:
        "200":
          description: Success get the health status of the API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    CreateProductRequest:
      description: Required and optional request body to create a new product
      type: object
      required:
        - name
        - quantity
        - price
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 150
          example: Kinera Celest Wyvern White
        quantity:
          type: integer
          minimum: 0
          example: 11
        price:
          type: integer
          description: price are in Rupiah (Rp)
          minimum: 0
          example: 500000
        description:
          type: string
          minLength: 3
          maxLength: 2000
          example: Garansi resmi 1 tahun
    Product:
      description: Represents a product resource returned by the API
      type: object
      required:
        - id
        - name
        - quantity
        - price
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: dcc02b52-a93e-4326-ae81-d1560f3b91d3
        name:
          type: string
          minLength: 3
          maxLength: 150
          example: Kinera Celest Wyvern White
        quantity:
          type: integer
          minimum: 0
          example: 11
        price:
          type: integer
          description: Represents price in Rupiah (Rp)
          minimum: 0
          example: 500000
        description:
          type: string
          minLength: 3
          maxLength: 2000
          example: Garansi resmi 1 tahun
        createdAt:
          type: string
          format: date-time
          example: 2026-04-20T14:32:28Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-20T14:32:28Z
    HealthStatus:
      description: Represents the health status of the API
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Ok
    BadRequest:
      description: Bad request response schema
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: Invalid request body
            fields:
              type: object
              additionalProperties:
                type: string
          required:
            - code
            - message
            - fields
      required:
        - error
    Unauthorized:
      description: Unauthorized response schema
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Unauthorized user. Please log in to an existing user or register a new user
          required:
            - code
            - message
      required:
        - error
    Forbidden:
      description: Forbidden response schema
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: FORBIDDEN
            message:
              type: string
              example: Forbidden access. You're not allowed to do this operation
          required:
            - code
            - message
      required:
        - error
    InternalServerError:
      description: Internal server error response schema
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: INTERNAL_SERVER_ERROR
            message:
              type: string
              example: We're sorry your operation can't be executed during this time due to internal problem. Please try again later
          required:
            - code
            - message
      required:
        - error

  requestBodies:
    CreateProduct:
      description: Create product request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateProductRequest"

  responses:
    CreateProductSuccess:
      description: Success create a new product
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Product"
    CreateProductBadRequest:
      description: Failed to create a new product caused by invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequest"
    CreateProductUnauthorized:
      description: Failed to create a new product caused by unauthorized user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Unauthorized"
    CreateProductForbidden:
      description: Failed to create a new product caused by forbidden access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Forbidden"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerError"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
